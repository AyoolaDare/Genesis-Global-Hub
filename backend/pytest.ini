[pytest]
# ── Test Discovery ─────────────────────────────────────────────────────────────
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# ── Asyncio Mode ───────────────────────────────────────────────────────────────
# Required by pytest-asyncio for async test functions (test_dedup.py)
asyncio_mode = auto

# ── Output / Verbosity ─────────────────────────────────────────────────────────
addopts =
    --tb=short
    --strict-markers
    -q

# ── Custom Marks ───────────────────────────────────────────────────────────────
# Declare all custom marks used throughout the suite so --strict-markers passes.
markers =
    asyncio: mark a test as an asyncio coroutine
    integration: marks tests that require external services (deselect with -m "not integration")
    slow: marks tests that take more than 1 second
    parametrize: built-in parametrize mark (declared to silence strict-marker warning)

# ── Warnings ───────────────────────────────────────────────────────────────────
filterwarnings =
    # SQLAlchemy 2.x deprecation warnings from test DB setup
    ignore::sqlalchemy.exc.SADeprecationWarning
    # pytest-asyncio mode warning when mixing sync/async fixtures
    ignore::pytest.PytestUnraisableExceptionWarning
    # Pydantic v1 → v2 migration warnings emitted by FastAPI internals
    ignore::DeprecationWarning:pydantic
    # Suppress coroutine-was-never-awaited from test teardown edge cases
    ignore::RuntimeWarning:asyncio

# ── Coverage (if pytest-cov is installed) ─────────────────────────────────────
# Uncomment to enable coverage reporting:
# addopts =
#     --cov=app
#     --cov-report=term-missing
#     --cov-report=html:htmlcov
#     --cov-fail-under=80
#     --tb=short
#     --strict-markers
#     -q
