name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch when a new push arrives
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Backend: Lint ─────────────────────────────────────────────────────────────
  lint-backend:
    name: "Backend — Lint (ruff)"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install ruff
        run: pip install ruff==0.4.4

      - name: Lint app/
        run: cd backend && ruff check app/ --output-format=github

  # ── Backend: Tests ────────────────────────────────────────────────────────────
  test-backend:
    name: "Backend — Tests (pytest)"
    runs-on: ubuntu-latest
    needs: lint-backend

    # Service containers run alongside the job (for local Redis in tests)
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: cd backend && pip install -r requirements.txt

      - name: Install test dependencies
        run: pip install pytest==8.3.3 pytest-asyncio==0.24.0 pytest-cov==6.0.0 factory-boy==3.3.1

      - name: Run tests
        run: cd backend && pytest tests/ -v --tb=short --cov=app --cov-report=xml
        env:
          # Use Supabase test project or a local Postgres for CI
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          SUPABASE_URL: ${{ secrets.TEST_SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.TEST_SUPABASE_SERVICE_KEY }}
          SUPABASE_ANON_KEY: ${{ secrets.TEST_SUPABASE_ANON_KEY }}
          JWT_SECRET_KEY: test-secret-key-minimum-32-characters-for-ci
          JWT_ALGORITHM: HS256
          UPSTASH_REDIS_URL: redis://localhost:6379
          FLUTTERWAVE_SECRET_KEY: flutterwave-secret-key-for-ci-only
          FLUTTERWAVE_ENCRYPTION_KEY: ci-placeholder
          TERMII_API_KEY: ci-placeholder
          TERMII_SENDER_ID: GenesisGL
          SENDGRID_API_KEY: sendgrid-api-key-for-ci-only
          FROM_EMAIL: ci@test.example
          ALLOWED_ORIGINS: http://localhost:3000
          ENVIRONMENT: test

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v4
        with:
          file: backend/coverage.xml
          fail_ci_if_error: false

  # ── Frontend: Analyze + Build ─────────────────────────────────────────────────
  build-frontend:
    name: "Frontend — Analyze + Build (Flutter Web)"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter 3.19.0
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.19.0'
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: cd frontend && flutter pub get

      - name: Run dart analyze
        run: cd frontend && flutter analyze --no-fatal-infos

      - name: Build Flutter Web (CanvasKit renderer)
        run: |
          cd frontend && flutter build web \
            --release \
            --web-renderer canvaskit \
            --dart-define=API_BASE_URL=${{ vars.API_BASE_URL || 'https://genesis-global-api.onrender.com' }}

      - name: Check build output size
        run: |
          BUILD_SIZE=$(du -sh frontend/build/web | cut -f1)
          echo "Flutter web build size: $BUILD_SIZE"
          # Warn if over 50MB (indicative of unoptimized assets)
          BUILD_BYTES=$(du -sb frontend/build/web | cut -f1)
          if [ "$BUILD_BYTES" -gt 52428800 ]; then
            echo "WARNING: Build exceeds 50MB. Review asset sizes."
          fi

  # ── Security: Dependency Audit ─────────────────────────────────────────────
  security-audit:
    name: "Security — Dependency Audit"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Audit Python dependencies with pip-audit
        run: |
          pip install pip-audit
          cd backend && pip-audit -r requirements.txt --ignore-vuln PYSEC-2022-42974 || true
        # "|| true" prevents blocking deploys on advisories without fixes.
        # Remove when all vulnerabilities have upstream fixes.

      - name: Check for secrets in code (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true
