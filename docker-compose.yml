# ─────────────────────────────────────────────────────────────────────────────
# Genesis Global CMS — Docker Compose (Local Development)
# Usage:
#   1. cp backend/.env.example backend/.env && fill in values
#   2. docker compose up --build
#   3. API available at http://localhost:8000
#   4. API docs at http://localhost:8000/docs (development mode only)
#
# NOTE: Supabase PostgreSQL is REMOTE (Supabase cloud). This compose file
#       runs a local Redis for development so you don't consume Upstash quota.
#       In production, set UPSTASH_REDIS_URL to the real Upstash TLS URL.
# ─────────────────────────────────────────────────────────────────────────────

version: '3.8'

services:
  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - JWT_ALGORITHM=${JWT_ALGORITHM:-HS256}
      - ACCESS_TOKEN_EXPIRE_HOURS=${ACCESS_TOKEN_EXPIRE_HOURS:-24}
      - REFRESH_TOKEN_EXPIRE_DAYS=${REFRESH_TOKEN_EXPIRE_DAYS:-30}
      # In dev, point at local Redis. Override with Upstash URL if needed.
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:-redis://redis:6379}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-FLWSECK_TEST-placeholder}
      - FLUTTERWAVE_ENCRYPTION_KEY=${FLUTTERWAVE_ENCRYPTION_KEY:-placeholder}
      - TERMII_API_KEY=${TERMII_API_KEY:-placeholder}
      - TERMII_SENDER_ID=${TERMII_SENDER_ID:-GenesisGlobal}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-SG.placeholder}
      - FROM_EMAIL=${FROM_EMAIL:-dev@localhost}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5000,http://localhost:8080
      - RATE_LIMIT_AUTH_ATTEMPTS=20
      - RATE_LIMIT_AUTH_WINDOW_SECONDS=60
    volumes:
      # Hot-reload: mount source so Uvicorn --reload picks up changes
      - ./backend:/app
    # Override Docker CMD with --reload for development
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ── Celery Worker ─────────────────────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:-redis://redis:6379}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-placeholder}
      - TERMII_API_KEY=${TERMII_API_KEY:-placeholder}
      - TERMII_SENDER_ID=${TERMII_SENDER_ID:-GenesisGlobal}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-placeholder}
      - FROM_EMAIL=${FROM_EMAIL:-dev@localhost}
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app worker --loglevel=info --concurrency=2
    depends_on:
      - api
      - redis
    restart: unless-stopped

  # ── Celery Beat (Periodic Task Scheduler) ─────────────────────────────────────
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=development
      - DATABASE_URL=${DATABASE_URL}
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_SERVICE_KEY=${SUPABASE_SERVICE_KEY}
      - SUPABASE_ANON_KEY=${SUPABASE_ANON_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - UPSTASH_REDIS_URL=${UPSTASH_REDIS_URL:-redis://redis:6379}
      - FLUTTERWAVE_SECRET_KEY=${FLUTTERWAVE_SECRET_KEY:-placeholder}
      - TERMII_API_KEY=${TERMII_API_KEY:-placeholder}
      - TERMII_SENDER_ID=${TERMII_SENDER_ID:-GenesisGlobal}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY:-placeholder}
      - FROM_EMAIL=${FROM_EMAIL:-dev@localhost}
    volumes:
      - ./backend:/app
    command: celery -A app.workers.celery_app beat --loglevel=info
    depends_on:
      - api
      - redis
    restart: unless-stopped

  # ── Local Redis ───────────────────────────────────────────────────────────────
  # Used only in development. Production uses Upstash (TLS, cloud-managed).
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    # Persist data between container restarts during dev sessions
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  redis_data:
    driver: local
